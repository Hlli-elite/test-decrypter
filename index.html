<!DOCTYPE html>
<html>
<body>
  <input type="file" id="fileInput" accept=".Save,.save">
  <button onclick="decrypt()">Decrypt</button>
  <a id="downloadLink" style="display:none">Download Decrypted JSON</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script>
    async function decrypt() {
      const file = document.getElementById('fileInput').files[0];
      const buf = await file.arrayBuffer();
      const b = new Uint8Array(buf);

      const salt = b.slice(52, 76);      // s = b[52:76]
      const enc  = b.slice(76);          // e = b[76:]

      // PBKDF2 with SHA-1, 10 iterations, 32 bytes — matches Python
      const keyMaterial = await crypto.subtle.importKey(
        "raw", new TextEncoder().encode("11"),
        "PBKDF2", false, ["deriveBits"]
      );
      const derived = await crypto.subtle.deriveBits(
        { name: "PBKDF2", hash: "SHA-1", salt, iterations: 10 },
        keyMaterial, 256  // 32 bytes
      );

      const keyBytes = new Uint8Array(derived);
      const iv  = keyBytes.slice(0, 16);   // k[:16]
      const key = keyBytes.slice(16, 32);  // k[16:32]

      // AES-CBC decrypt
      const aesKey = await crypto.subtle.importKey(
        "raw", key, { name: "AES-CBC" }, false, ["decrypt"]
      );
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-CBC", iv }, aesKey, enc
      );

      // zlib decompress (pako handles zlib format)
      const decompressed = pako.inflate(new Uint8Array(decrypted));

      // Offer download
      const blob = new Blob([decompressed], { type: "application/json" });
      const link = document.getElementById('downloadLink');
      link.href = URL.createObjectURL(blob);
      link.download = "Decrypted_Profile.json";
      link.style.display = "block";
      link.textContent = "Download Decrypted JSON";
    }
  </script>
</body>
</html>
